# Nami Light Theme for Foot
# https://github.com/micdzu/nami.nvim
# Copy to ~/.config/foot/foot.ini or include in your config

[colors]
alpha=1.0
background=F0E8FF
foreground=2A254A

# Normal/regular colors (color palette 0-7)
regular0=2A254A # black
regular1=A2556A # red
regular2=647F58 # green
regular3=A87055 # yellow
regular4=59699C # blue
regular5=865C99 # magenta
regular6=497E7B # cyan
regular7=F0E8FF # white

# Bright colors (color palette 8-15)
bright0=665E96 # bright black
bright1=A2556A # bright red
bright2=647F58 # bright green
bright3=A87055 # bright yellow
bright4=59699C # bright blue
bright5=865C99 # bright magenta
bright6=497E7B # bright cyan
bright7=F5F0FF # bright white - Nami palette friendly

# Extended colors (16-255)
# 16 = Orange, 17 = Pink
16=A87055
17=865C99

# Selection
selection-background=C8BFF0
selection-foreground=2A254A

# Cursor
cursor-color=2A254A
cursor-text=F0E8FF

# URLs
urls=497E7B

# Scrollback buffer search highlighting
jump-labels=A2556A F0E8FF
scrollback-indicator=665E96 F0E8FF
search-box-no-match=A2556A F0E8FF
search-box-match=647F58 F0E8FF
