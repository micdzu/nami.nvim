# Nami Dark Theme for Foot
# https://github.com/micdzu/nami.nvim
# Copy to ~/.config/foot/foot.ini or include in your config

[colors]
alpha=1.0
background=1A1732
foreground=C9C2FF

# Normal/regular colors (color palette 0-7)
regular0=1A1732   # black
regular1=E87A98   # red
regular2=A7D494   # green
regular3=F0A07A   # yellow
regular4=8AA2F0   # blue
regular5=CF8EEC   # magenta
regular6=7AD2CE   # cyan
regular7=C9C2FF   # white

# Bright colors (color palette 8-15)
bright0=6B6796    # bright black
bright1=E87A98    # bright red
bright2=A7D494    # bright green
bright3=F0A07A    # bright yellow
bright4=8AA2F0    # bright blue
bright5=CF8EEC    # bright magenta
bright6=7AD2CE    # bright cyan
bright7=D8D2FF    # bright white

# Extended colors (16-255)
# 16 = Orange, 17 = Pink
16=F0A07A
17=C686B2

# Selection
selection-background=2F2A55
selection-foreground=C9C2FF

# Cursor
cursor-color=C9C2FF
cursor-text=1A1732

# URLs
urls=7AD2CE

# Scrollback buffer search highlighting
jump-labels=E87A98 1A1732
scrollback-indicator=6B6796 1A1732
search-box-no-match=E87A98 1A1732
search-box-match=A7D494 1A1732
