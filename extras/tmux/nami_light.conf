# Nami Light Theme for Tmux
# https://github.com/micdzu/nami.nvim
# Add to ~/.tmux.conf or source from a separate file

# Status bar colors
set -g status-style bg=#F0E8FF,fg=#2A254A
set -g status-left-style bg=#F0E8FF,fg=#2A254A
set -g status-right-style bg=#F0E8FF,fg=#2A254A

# Window status - standardized bg_light to #E6DEF7
setw -g window-status-style bg=#E6DEF7,fg=#665E96
setw -g window-status-current-style bg=#C8BFF0,fg=#2A254A,bold
setw -g window-status-activity-style bg=#F0E8FF,fg=#A87055

# Pane borders
set -g pane-border-style fg=#665E96
set -g pane-active-border-style fg=#59699C

# Message/command line
set -g message-style bg=#C8BFF0,fg=#2A254A
set -g message-command-style bg=#C8BFF0,fg=#2A254A

# Clock mode
setw -g clock-mode-color #59699C

# Copy mode
setw -g mode-style bg=#C8BFF0,fg=#2A254A

# Status bar formats (optional customization)
set -g status-left " #[fg=#59699C,bold]#S #[fg=#665E96]| "
set -g status-right " #[fg=#665E96]| #[fg=#647F58]%Y-%m-%d #[fg=#665E96]| #[fg=#865C99]%H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[fg=#865C99,bold]#I:#W* "
