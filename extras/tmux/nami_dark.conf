# Nami Dark Theme for Tmux
# https://github.com/micdzu/nami.nvim
# Add to ~/.tmux.conf or source from a separate file

# Status bar colors
set -g status-style bg=#1A1732,fg=#C9C2FF
set -g status-left-style bg=#1A1732,fg=#C9C2FF
set -g status-right-style bg=#1A1732,fg=#C9C2FF

# Window status
setw -g window-status-style bg=#211E3F,fg=#6B6796
setw -g window-status-current-style bg=#2F2A55,fg=#C9C2FF,bold
setw -g window-status-activity-style bg=#1A1732,fg=#F0A07A

# Pane borders
set -g pane-border-style fg=#6B6796
set -g pane-active-border-style fg=#8AA2F0

# Message/command line
set -g message-style bg=#2F2A55,fg=#C9C2FF
set -g message-command-style bg=#2F2A55,fg=#C9C2FF

# Clock mode
setw -g clock-mode-color #8AA2F0

# Copy mode
setw -g mode-style bg=#2F2A55,fg=#C9C2FF

# Status bar formats (optional customization)
set -g status-left " #[fg=#8AA2F0,bold]#S #[fg=#6B6796]| "
set -g status-right " #[fg=#6B6796]| #[fg=#A7D494]%Y-%m-%d #[fg=#6B6796]| #[fg=#CF8EEC]%H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[fg=#CF8EEC,bold]#I:#W* "
